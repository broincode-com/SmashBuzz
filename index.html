<html>
    <head>
        <title>SHAMSHBUZZBROS</title>
        <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

        <style>
            body{
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <h1>SHAMSHBUZZBROS</h1>
        <div id="host">
            <h1>Host Game</h1>
            <button id="btn-host">Host Game</button>
        </div>
            
    
        <div id="join">
            <h1>Join Game</h1>
            <input id="player-id" type="text" placeholder="Player ID">
            <input id="room-id" type="text" placeholder="codice stanza">
            <button id="btn-join">Join Game</button>
        </div>

        <div hidden id="game">
            <p id="status"></p>
            <div id="leaderboard" style="display: flex; flex-direction:column;"></div>

            <button onclick="resetClicked()" id="btn-reset">Reset</button>

            <div>
                <p id="notify"></p>
                <button onclick="buzzClicked()" id="buzz">Buzz</button>
                <canvas id="canvas" style="width: 100vw; height:100vh;" hidden></canvas>
            </div>
        </div>

        <script>
            let peer = null;
            let isHost = false;
            let nickname = "Host"

            let hostsMap = {};
            let playerConn = null;

            let hasBuzzed = false;

            let localDrawing = false;

            const game = document.getElementById('game');
            const hostPanel = document.getElementById('host');
            const joinPanel = document.getElementById('join');
            const statusText = document.getElementById('status');
            const leaderboard = document.getElementById('leaderboard');
            const buzz = document.getElementById('buzz');
            const notify = document.getElementById('notify');
            const reset = document.getElementById('btn-reset');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            document.getElementById('btn-host').addEventListener('click', () => {
                isHost = true;
                
                peer = new Peer();

                peer.on('open', (id) => {
                    showGameScreen("Host", id);
                    setupHostListeners();
                });
            });

            document.getElementById('btn-join').addEventListener('click', () => {
                const playerID = document.getElementById('player-id').value.trim();
                const roomID = document.getElementById('room-id').value.trim();
                
                if(!nickname || !roomID)
                {
                    alert("Please dont be a dick!");
                    return; 
                }

                isHost = false;
                nickname = playerID;

                peer = new Peer();
                peer.on('open', () => {
                    playerConn = peer.connect(roomID);

                    playerConn.on('open', () => {
                        showGameScreen(nickname, roomID);
                        playerConn.send({type: 'HANDSHAKE', name: nickname});
                    });

                    setupPlayerListeners();
                });
            });

            function rejection(msg)
            {
                hostPanel.hidden = false;
                joinPanel.hidden = false;

                game.hidden = true;

                alert(msg);
            }

            function setupHostListeners()
            {
                peer.on('connection', (conn) =>{
                    conn.on('data', (data) => {
                        if(data.type === 'HANDSHAKE')
                        {
                            if(hasBuzzed)
                            {
                                conn.send({type:"REJECTED", msg:"Partita in corso..."});
                                conn.close();
                                return;
                            }
                            hostsMap[conn.peer] = {
                                conn: conn,
                                name: data.name,
                                score: 0
                            };

                            let players_list = getPlayerList(hostsMap);

                            updateLeadearboard(players_list);
                            
                            broadcastAll({type:"SYNC_LEADERBOARD", players: players_list});
                        }

                        if(data.type === "BUZZ")
                        {
                            if(hasBuzzed) return;
                            hasBuzzed = true;

                            notify.textContent = hostsMap[conn.peer].name + " BUZZED";

                            broadcastAll({type: "SYNC_BUZZ", name: hostsMap[conn.peer].name}, peer);
                            hostsMap[conn.peer].conn.send({type:"DRAW"});
                        }
                        
                        if(data.type === "RESET")
                        {
                            resetGame();
                        }
                        
                        if(data.type === "DRAW_STREAM")
                        {
                            drawVector(data.x, data.y, data.action);
                            broadcastAll(data, conn.peer);
                        }

                    });

                    conn.on('close', () => {
                        if(hostsMap[conn.peer])
                        {
                            delete hostsMap[conn.peer];
                            let players_list = getPlayerList(hostsMap);
                            updateLeadearboard(players_list);
                            broadcastAll({type:"SYNC_LEADERBOARD", players: players_list});
                        }
                    });
                });
            }

            function getPlayerList(hostsMap)
            {
                let players_list = {};
                let i = 0;
                Object.keys(hostsMap).forEach(peerID => {
                    const n = hostsMap[peerID].name;
                    const s = hostsMap[peerID].score;

                    players_list[i] = {
                        name: n,
                        score: s
                    };

                    i++;

                });

                return players_list;
            }

            function setupPlayerListeners()
            {
                playerConn.on('data', (data) => {
                    if(data.type === "SYNC_LEADERBOARD")
                    {
                        updateLeadearboard(data.players);
                    }

                    if(data.type === "SYNC_BUZZ")
                    {
                        switchToCanvas(data.name);
                    }

                    if(data.type === "RESET")
                    {
                        resetGame();
                    }
                    
                    if(data.type === "DRAW_STREAM")
                    {
                        drawVector(data.x, data.y, data.action);
                    }

                    if(data.type === "DRAW")
                    {
                        setupCanvasInteractions();
                    }

                    if(data.type === "REJECTED")
                    {
                        rejection(data.msg);
                    }
                });
            }

            function showGameScreen(nickname, roomID)
            {
                hostPanel.hidden = true;
                joinPanel.hidden = true;

                game.hidden = false;

                disableCanvasInteractions();

                if(isHost)
                {
                    statusText.textContent = "ROOM ID: " + roomID;
                    reset.hidden = false;
                    buzz.hidden = true;
                    canvas.hidden = false;
                }else{
                    statusText.textContent = "ROOM ID: " + roomID + ". You are " + nickname;
                    reset.hidden = true;
                    buzz.hidden = false;
                    canvas.hidden = true;
                }
            }

            function updateLeadearboard(players)
            {
                leaderboard.innerHTML = "";
                Object.entries(players).forEach(([name, data]) => {
                    const n = data.name;
                    const s = data.score;
                    
                    if(isHost){
                        leaderboard.innerHTML += "<div style='display:flex; flex-direction:row;'><p>" + n + " " + s + "</p><button onclick='updateScore(\"" + n + "\")'>+1</button></div>";
                    }else{
                        leaderboard.innerHTML += "<div><p>" + n + " " + s + "</p></div>";
                    }
                });
            }

            function broadcastAll(payload, excludedPeerID = null)
            {
                Object.keys(hostsMap).forEach(peerID => {
                    if(peerID !== excludedPeerID)
                    {
                        const client = hostsMap[peerID].conn;
                        if(client.open) client.send(payload);
                    }
                });
            }

            function updateScore(name)
            {
                Object.keys(hostsMap).forEach(peerID => {
                    const n = hostsMap[peerID].name;

                    if(n === name)
                    {
                        hostsMap[peerID].score++;
                        updateLeadearboard(hostsMap);

                        broadcastAll({type:"SYNC_LEADERBOARD", players: getPlayerList(hostsMap)});
                    }
                });
            }

            function switchToCanvas(name)
            {
                if(isHost) return;
                
                buzz.hidden = true;
                canvas.hidden = false;
                notify.textContent = name + " BUZZED";
            }

            function buzzClicked()
            {
                if(isHost) return;

                playerConn.send({type: "BUZZ"});
            }

            function resetGame()
            {
                if(isHost)
                {
                    hasBuzzed = false;
                }else
                {
                    buzz.hidden = false;
                    canvas.hidden = true;
                }

                notify.textContent = "";
                disableCanvasInteractions();
                clearCanvasLocal();
            }

            function resetClicked()
            {
                resetGame();
                broadcastAll({type: "RESET"});
            }

            // CANVAS

            function getCanvasCoordinates(e)
            {
                const rect = canvas.getBoundingClientRect();

                return {x: (e.clientX - rect.left) * (canvas.width / rect.width),
                        y: (e.clientY - rect.top) * (canvas.height / rect.height)};
            }

            function setupCanvasInteractions()
            {
                canvas.onmousedown = startDrawingProcess;
                canvas.onmousemove = drawingMovementProcess;
                canvas.onmouseup = drawingStopProcess;
                canvas.onmouseleave = drawingStopProcess;
                
                canvas.ontouchstart = (e) => {const t = e.touches[0]; startDrawingProcess(t); e.preventDefault();};
                canvas.ontouchmove = (e) => {const t = e.touches[0]; drawingMovementProcess(t); e.preventDefault();};;
                canvas.ontouchend = drawingStopProcess;
            }

            function startDrawingProcess(e)
            {
                localDrawing = true;
                const coords = getCanvasCoordinates(e);
                drawVector(coords.x, coords.y, 'start');

                if(!isHost && playerConn.open)
                {
                    playerConn.send({type:"DRAW_STREAM", x:coords.x, y:coords.y,action:'start'});
                }
            }

            function drawingMovementProcess(e)
            {
                if(!localDrawing) return;
                const coords = getCanvasCoordinates(e);
                drawVector(coords.x, coords.y, 'move');

                if(!isHost && playerConn.open)
                {
                    playerConn.send({type:"DRAW_STREAM", x:coords.x, y:coords.y,action:'move'});
                }
            }

            function drawingStopProcess(e)
            {
                if(!localDrawing) return;
                localDrawing = false;
                ctx.beginPath();

                if(!isHost && playerConn.open)
                {
                    playerConn.send({type:"DRAW_STREAM", x:0, y:0, action:'stop'});
                }
            }

            function disableCanvasInteractions()
            {
                canvas.onmousedown = null;
                canvas.onmousemove = null;
                canvas.onmouseup = null;
                canvas.onmouseleave = null;
                canvas.ontouchstart = null;
                canvas.ontouchmove = null;
                canvas.ontouchend = null;
            }

            function clearCanvasLocal()
            {
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }

            function drawVector(x, y, action)
            {
                ctx.lineWidth = 1;
                ctx.lineCap = 'round';
                ctx.strokeStyle = "#000000";

                if(action === 'start')
                {
                        
                    ctx.moveTo(x,y);
                    ctx.lineTo(x,y);
                    ctx.stroke();
                }
                else if(action === 'move')
                {
                    ctx.lineTo(x,y);
                    ctx.stroke();
                }else if(action === 'stop')
                {
                    ctx.beginPath();
                }
            }

        </script>
    
    </body>
</html>
